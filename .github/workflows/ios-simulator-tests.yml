name: iOS Simulator Tests

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-simulator-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Run Lightweight iOS Simulator Tests
        env:
          NSUnbufferedIO: "YES"
        run: ./scripts/test-light.sh
